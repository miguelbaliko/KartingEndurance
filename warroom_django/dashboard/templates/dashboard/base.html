<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}APX GP War Room{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">APX GP <span class="brand-sub">WAR ROOM</span></span>
    <div class="navbar-links">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">COMMAND</a>
      <a href="/strategist/" class="nav-link {% if '/strategist' in request.path %}active{% endif %}">STRATEGIST</a>
      <a href="/admin/" class="nav-link">ADMIN</a>
    </div>
    <div class="navbar-status">
      <span id="conn-dot" class="conn-dot connecting"></span>
      <span id="conn-label">CONNECTING</span>
      <span class="sep">|</span>
      <span id="mode-label">—</span>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'js/dashboard.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
