services:
  - type: web
    name: apx-warroom
    runtime: python
    rootDir: warroom
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gevent --workers 2 --timeout 0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
